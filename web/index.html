<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintSpy</title>
    <link rel="icon" href="/logo.png">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="/logo.png" alt="PrintSpy" class="header-logo">
            <h1>PrintSpy</h1>
            <span class="app-version" id="app-version"></span>
            <span class="printer-count" id="printer-count"></span>
            <span class="power-controls" id="power-controls" style="display:none">
                <button class="btn btn-sm" onclick="bulkPower('on')" title="Turn all printers on">&#9889; All On</button>
                <button class="btn btn-sm" onclick="bulkPower('off')" title="Turn all printers off">&#9889; All Off</button>
            </span>
            <button class="btn btn-icon" onclick="openSettings()" title="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </header>

        <div class="connection-banner" id="connection-banner" style="display:none">
            <span class="banner-dot"></span>
            <span id="banner-text">Connection lost — reconnecting...</span>
        </div>

        <div id="printer-list"></div>
    </div>

    <!-- Add/Edit Printer Modal -->
    <div class="modal-overlay" id="printer-modal">
        <div class="modal">
            <h2 id="modal-title">Add printer</h2>
            <form id="printer-form" onsubmit="savePrinter(event)">
                <input type="hidden" id="printer-id" value="">
                <div class="form-group">
                    <label for="printer-name">Name</label>
                    <input type="text" id="printer-name" placeholder="My Printer" required>
                </div>
                <div class="form-group">
                    <label for="printer-type">Type</label>
                    <select id="printer-type">
                        <option value="octoprint">OctoPrint</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="printer-url">URL</label>
                    <input type="url" id="printer-url" placeholder="http://192.168.1.40" required>
                </div>
                <div class="form-group">
                    <label for="printer-apikey">API Key</label>
                    <input type="text" id="printer-apikey" placeholder="Your OctoPrint API key" required>
                </div>
                <div class="form-group">
                    <label for="printer-poll">Poll interval (seconds)</label>
                    <input type="number" id="printer-poll" value="10" min="5" max="300">
                </div>
                <div class="test-result" id="test-result"></div>
                <div class="form-actions">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="button" class="btn" id="test-btn" onclick="testConnection()">Test connection</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal modal-wide">
            <h2>Settings</h2>

            <div class="settings-section">
                <h3>Printers</h3>
                <div id="settings-printer-list"></div>
                <button class="btn btn-primary" onclick="closeModal();openAddModal()" style="margin-top:0.75rem">+ Add printer</button>
            </div>

            <div class="settings-section">
                <h3>General</h3>
                <form onsubmit="saveSettings(event)">
                    <div class="form-group">
                        <label for="setting-snapshot-interval">Snapshot refresh interval (seconds)</label>
                        <input type="number" id="setting-snapshot-interval" value="10" min="3" max="300">
                        <div class="form-hint">How often webcam snapshots refresh. Lower values use more bandwidth.</div>
                    </div>
                    <div class="form-group">
                        <label for="setting-recent-files">Recent files to show</label>
                        <input type="number" id="setting-recent-files" value="5" min="1" max="20">
                        <div class="form-hint">Number of files shown in the recent files dropdown per printer.</div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
