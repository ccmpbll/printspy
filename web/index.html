<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintSpy</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>PrintSpy</h1>
            <span class="status-dot"></span>
            <span class="printer-count" id="printer-count"></span>
            <button class="btn" onclick="openSettings()" title="Settings">&#9881;</button>
            <button class="btn btn-primary" onclick="openAddModal()">+ Add printer</button>
        </header>

        <div id="printer-list"></div>
    </div>

    <!-- Add/Edit Printer Modal -->
    <div class="modal-overlay" id="printer-modal">
        <div class="modal">
            <h2 id="modal-title">Add printer</h2>
            <form id="printer-form" onsubmit="savePrinter(event)">
                <input type="hidden" id="printer-id" value="">
                <div class="form-group">
                    <label for="printer-name">Name</label>
                    <input type="text" id="printer-name" placeholder="My Printer" required>
                </div>
                <div class="form-group">
                    <label for="printer-type">Type</label>
                    <select id="printer-type">
                        <option value="octoprint">OctoPrint</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="printer-url">URL</label>
                    <input type="url" id="printer-url" placeholder="http://192.168.1.40" required>
                </div>
                <div class="form-group">
                    <label for="printer-apikey">API Key</label>
                    <input type="text" id="printer-apikey" placeholder="Your OctoPrint API key" required>
                </div>
                <div class="form-group">
                    <label for="printer-poll">Poll interval (seconds)</label>
                    <input type="number" id="printer-poll" value="10" min="5" max="300">
                </div>
                <div class="test-result" id="test-result"></div>
                <div class="form-actions">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="button" class="btn" id="test-btn" onclick="testConnection()">Test connection</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2>Settings</h2>
            <form onsubmit="saveSettings(event)">
                <div class="form-group">
                    <label for="setting-snapshot-interval">Snapshot refresh interval (seconds)</label>
                    <input type="number" id="setting-snapshot-interval" value="10" min="3" max="300">
                    <div class="form-hint">How often webcam snapshots refresh. Lower values use more bandwidth.</div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
